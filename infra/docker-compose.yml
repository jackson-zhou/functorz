services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: functorz
      POSTGRES_USER: functorz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      { test: [CMD-SHELL, 'pg_isready -U functorz'], interval: 10s, timeout: 5s, retries: 5 }
  redis:
    image: redis:7.4-alpine
    command: [redis-server, --appendonly, 'yes', --maxmemory, 256mb, --maxmemory-policy, noeviction]
    volumes: [redis-data:/data]
    healthcheck: { test: [CMD, redis-cli, ping], interval: 10s, timeout: 5s, retries: 5 }
  api:
    build: { context: .., dockerfile: infra/node.Dockerfile, args: { APP: api } }
    environment:
      {
        DATABASE_URL: 'postgres://functorz:${POSTGRES_PASSWORD}@postgres/functorz',
        REDIS_URL: 'redis://redis:6379',
        ASSET_ROOT: /data/assets,
      }
    volumes: [assets:/data/assets]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    restart: unless-stopped
    command: [sh, -c, 'pnpm --filter api db:migrate && node apps/api/dist/index.js']
  worker:
    build: { context: .., dockerfile: infra/node.Dockerfile, args: { APP: worker } }
    environment:
      {
        DATABASE_URL: 'postgres://functorz:${POSTGRES_PASSWORD}@postgres/functorz',
        REDIS_URL: 'redis://redis:6379',
        WECHAT_APP_ID: '${WECHAT_APP_ID:-}',
        WECHAT_PRIVATE_KEY_PATH: '${WECHAT_PRIVATE_KEY_PATH:-}',
      }
    volumes: ['./secrets:/run/secrets:ro']
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    deploy: { resources: { limits: { memory: 2G } } }
    restart: unless-stopped
  studio:
    build: { context: .., dockerfile: infra/studio.Dockerfile }
    restart: unless-stopped
  runtime:
    build: { context: .., dockerfile: infra/runtime.Dockerfile }
    restart: unless-stopped
  nginx:
    image: nginx:1.27-alpine
    ports: ['${HTTP_PORT:-80}:80']
    volumes: [./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro]
    depends_on: [studio, runtime, api]
    restart: unless-stopped
volumes: { postgres-data: {}, redis-data: {}, assets: {} }
