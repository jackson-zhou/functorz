limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
server { listen 80; server_tokens off; client_max_body_size 6m;
  location /api/ { limit_req zone=api burst=40 nodelay; proxy_set_header X-Request-ID $request_id; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_pass http://api:3000/; }
  location /runtime/ { proxy_pass http://runtime/; proxy_set_header X-Request-ID $request_id; }
  location / { proxy_pass http://studio:80; proxy_set_header X-Request-ID $request_id; }
}
